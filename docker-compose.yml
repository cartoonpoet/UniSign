version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: unisign-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unisign
      POSTGRES_PASSWORD: unisign
      POSTGRES_DB: unisign
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unisign']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: unisign-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: unisign-gotenberg
    restart: unless-stopped
    ports:
      - '3030:3000'
    command:
      - 'gotenberg'
      - '--api-timeout=30s'

  mailpit:
    image: axllent/mailpit:latest
    container_name: unisign-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI
    environment:
      MP_MAX_MESSAGES: 200
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
  redis_data:
